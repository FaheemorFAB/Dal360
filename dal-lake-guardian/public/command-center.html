<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dal Lake Digital Twin — Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --ink:#0B1F22;
  --water-deep:#0F2C33;
  --water-mid:#1B4148;
  --water-light:#2E5A5C;
  --mist:#8FAFA9;
  --parchment:#EDE6D6;
  --parchment-dim:#B9AF98;
  --chinar:#C77B3D;
  --chinar-bright:#E29A56;
  --healthy:#5E9169;
  --moderate:#CDA23E;
  --critical:#B4463C;
  --emergency:#7A2A22;
  --line:rgba(237,230,214,0.12);
  --panel:#102A30;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--ink);color:var(--parchment);font-family:'Inter',sans-serif;}
body{min-height:100vh;}
::selection{background:var(--chinar);color:var(--ink);}

.app{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.top{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:22px 32px 16px 32px;
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;gap:10px;
}
.brand{display:flex;align-items:baseline;gap:14px;}
.brand h1{
  font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:0.2px;margin:0;color:var(--parchment);
}
.brand .sub{
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--chinar-bright);
}
.top-meta{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--mist);text-align:right;line-height:1.6;}
.top-meta b{color:var(--parchment-dim);}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:260px 1fr 340px;
  gap:0;
  flex:1;
  min-height:0;
}
@media (max-width: 1100px){
  .layout{grid-template-columns:1fr;}
}

.panel-title{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--chinar-bright);margin:0 0 14px 0;display:flex;align-items:center;gap:8px;
}
.panel-title::before{content:'';width:14px;height:1px;background:var(--chinar-bright);display:inline-block;}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--line);
  padding:22px 20px;
  overflow-y:auto;
}
.sector-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 10px;border-radius:6px;cursor:pointer;
  margin-bottom:4px;border:1px solid transparent;
  transition:background .15s, border-color .15s;
}
.sector-item:hover{background:rgba(237,230,214,0.05);}
.sector-item.active{background:rgba(199,123,61,0.12);border-color:rgba(199,123,61,0.4);}
.sector-item .name{font-size:13px;font-weight:500;color:var(--parchment);}
.sector-item .name span{display:block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);font-weight:400;margin-top:2px;letter-spacing:0.5px;}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}

.module-toggles{margin-top:26px;padding-top:20px;border-top:1px solid var(--line);}
.chip{
  display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  padding:6px 10px;border:1px solid var(--line);border-radius:20px;margin:0 6px 8px 0;cursor:pointer;color:var(--mist);
  transition:all .15s;
}
.chip.on{background:var(--chinar);color:var(--ink);border-color:var(--chinar);font-weight:600;}

/* CENTER MAP */
.center{
  padding:22px 26px;display:flex;flex-direction:column;min-height:0;
}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px;
}
.stat-card .val{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1;color:var(--parchment);}
.stat-card .lbl{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mist);margin-top:6px;}
.stat-card.warn .val{color:var(--critical);}
.stat-card.good .val{color:var(--healthy);}

.map-wrap{
  position:relative;flex:1;min-height:380px;background:radial-gradient(ellipse at 50% 20%, #163a41 0%, var(--water-deep) 55%, #081a1e 100%);
  border:1px solid var(--line);border-radius:10px;overflow:hidden;
}
.map-wrap svg{width:100%;height:100%;display:block;}
.legend{
  position:absolute;bottom:14px;left:14px;background:rgba(11,31,34,0.85);border:1px solid var(--line);
  border-radius:8px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--parchment-dim);
  backdrop-filter:blur(4px);
}
.legend-row{display:flex;align-items:center;gap:8px;margin:3px 0;}
.legend-sw{width:11px;height:11px;border-radius:2px;}
.compass{position:absolute;top:14px;right:16px;opacity:0.85;}
.coords{position:absolute;top:14px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);line-height:1.5;}

.sector-poly{cursor:pointer;stroke:var(--ink);stroke-width:1.5;transition:opacity .2s, filter .2s;}
.sector-poly:hover{filter:brightness(1.18);}
.sector-poly.selected{stroke:var(--chinar-bright);stroke-width:2.5;}
.sector-label{font-family:'IBM Plex Mono',monospace;font-size:9px;fill:var(--ink);pointer-events:none;text-anchor:middle;font-weight:600;}

.timeline{
  margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 18px;
}
.timeline-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.timeline-top .day-lbl{font-family:'Fraunces',serif;font-size:15px;color:var(--chinar-bright);}
.timeline input[type=range]{width:100%;accent-color:var(--chinar);}
.timeline-days{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mist);margin-top:4px;}
.play-btn{
  background:none;border:1px solid var(--line);color:var(--parchment-dim);border-radius:6px;padding:5px 12px;
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;cursor:pointer;
}
.play-btn:hover{border-color:var(--chinar);color:var(--chinar-bright);}

/* RIGHT PANEL */
.right{
  border-left:1px solid var(--line);
  padding:22px 20px;display:flex;flex-direction:column;min-height:0;
}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);}
.tab{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;
  padding:8px 4px;margin-right:16px;color:var(--mist);cursor:pointer;border-bottom:2px solid transparent;
}
.tab.active{color:var(--chinar-bright);border-color:var(--chinar-bright);}
.tab-panel{flex:1;overflow-y:auto;min-height:0;}
.tab-panel::-webkit-scrollbar{width:5px;}
.tab-panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

/* Detail card for selected sector */
.detail-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px;}
.detail-card h3{font-family:'Fraunces',serif;font-size:18px;margin:0 0 2px 0;color:var(--parchment);}
.detail-card .badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;margin-top:6px;font-weight:600;
}
.bar-row{margin-top:10px;}
.bar-row .lbl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);margin-bottom:3px;}
.bar-bg{height:6px;background:rgba(237,230,214,0.08);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--chinar);}
.spark{margin-top:12px;}

/* Feed */
.feed-item{
  border-left:2px solid var(--line);padding:8px 0 8px 14px;margin-bottom:2px;position:relative;
}
.feed-item::before{content:'';position:absolute;left:-5px;top:13px;width:8px;height:8px;border-radius:50%;background:var(--mist);}
.feed-item.report::before{background:var(--chinar);}
.feed-item.ai::before{background:#5E86C7;}
.feed-item .tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:var(--chinar-bright);}
.feed-item .tag.ai{color:#7EA3E0;}
.feed-item .txt{font-size:12.5px;color:var(--parchment-dim);margin:3px 0;line-height:1.45;}
.feed-item .meta{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);}

/* Form */
.field{margin-bottom:14px;}
.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.8px;text-transform:uppercase;color:var(--mist);margin-bottom:6px;}
.field select,.field textarea,.field input{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--parchment);
  padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;
}
.field textarea{resize:vertical;min-height:70px;}
.submit-btn{
  width:100%;background:var(--chinar);color:var(--ink);border:none;border-radius:6px;padding:11px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;cursor:pointer;
}
.submit-btn:hover{background:var(--chinar-bright);}
.hint{font-size:11px;color:var(--mist);margin-top:8px;line-height:1.5;}

/* Rewards / loyalty */
.rewards-card{
  background:linear-gradient(160deg, rgba(199,123,61,0.14), rgba(199,123,61,0.03));
  border:1px solid rgba(199,123,61,0.35);border-radius:8px;padding:16px;margin-bottom:16px;
}
.rewards-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.rewards-tier{display:flex;align-items:center;gap:10px;}
.tier-badge{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;border:2px solid var(--chinar-bright);background:rgba(199,123,61,0.15);
}
.tier-name{font-family:'Fraunces',serif;font-size:16px;color:var(--parchment);line-height:1.2;}
.tier-sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);margin-top:2px;}
.points-val{font-family:'Fraunces',serif;font-size:24px;color:var(--chinar-bright);text-align:right;line-height:1;}
.points-lbl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--mist);text-align:right;margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
.progress-wrap{margin-top:14px;}
.progress-lbl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mist);margin-bottom:4px;}
.progress-bg{height:7px;background:rgba(237,230,214,0.08);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg, var(--chinar), var(--chinar-bright));transition:width .4s ease;}
.perk-list{margin-top:14px;border-top:1px solid rgba(237,230,214,0.1);padding-top:12px;}
.perk-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:11.5px;line-height:1.4;}
.perk-row .chk{flex-shrink:0;width:15px;font-family:'IBM Plex Mono',monospace;font-size:11px;}
.perk-row.unlocked{color:var(--parchment-dim);}
.perk-row.unlocked .chk{color:var(--healthy);}
.perk-row.locked{color:var(--mist);opacity:0.55;}
.perk-row.locked .chk{color:var(--mist);}
.perk-row .tname{color:var(--chinar-bright);font-weight:600;}
.flash-banner{
  background:rgba(94,145,105,0.15);border:1px solid var(--healthy);color:var(--healthy);
  border-radius:6px;padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;margin-bottom:14px;
  animation:flashIn .3s ease;
}
.flash-banner.tierup{background:rgba(199,123,61,0.15);border-color:var(--chinar);color:var(--chinar-bright);}
@keyframes flashIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.activity-log{margin-top:12px;border-top:1px solid rgba(237,230,214,0.1);padding-top:10px;}
.activity-row{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);padding:3px 0;}
.activity-row b{color:var(--chinar-bright);}
.header-points{
  display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--chinar-bright);border:1px solid rgba(199,123,61,0.4);border-radius:20px;padding:4px 11px;margin-top:6px;
}

/* Ops table */
.ops-row{
  display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:10px;
}
.ops-row:last-child{border-bottom:none;}
.ops-row .ttl{font-size:12.5px;color:var(--parchment);}
.ops-row .sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--mist);margin-top:2px;}
.assign-btn{
  flex-shrink:0;background:none;border:1px solid var(--healthy);color:var(--healthy);border-radius:5px;
  padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;cursor:pointer;
}
.assign-btn:hover{background:var(--healthy);color:var(--ink);}
.assign-btn:disabled{opacity:0.35;border-color:var(--mist);color:var(--mist);cursor:default;}

.empty{color:var(--mist);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:20px 0;text-align:center;}
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <div class="brand">
      <h1>Dal Lake Digital Twin</h1>
      <span class="sub">Intelligent Lake Management System</span>
    </div>
    <div class="top-meta">
      <div><b>34.1197°N, 74.8631°E</b> · Srinagar, J&amp;K</div>
      <div id="clockLine">—</div>
      <div class="header-points" id="headerPoints">🏅 — pts</div>
    </div>
  </div>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <p class="panel-title">Sectors</p>
      <div id="sectorList"></div>

      <div class="module-toggles">
        <p class="panel-title" style="margin-bottom:10px;">Modules</p>
        <div id="moduleChips"></div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="stats-row" id="statsRow"></div>

      <div class="map-wrap">
        <div class="coords" id="coordsBox">SECTOR — hover to inspect</div>
        <svg id="lakeSvg" viewBox="0 0 589 524" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="legend">
          <div class="legend-row"><span class="legend-sw" style="background:var(--healthy)"></span> 0–25 Healthy</div>
          <div class="legend-row"><span class="legend-sw" style="background:var(--moderate)"></span> 26–50 Moderate</div>
          <div class="legend-row"><span class="legend-sw" style="background:var(--critical)"></span> 51–75 Critical</div>
          <div class="legend-row"><span class="legend-sw" style="background:var(--emergency)"></span> 76–100 Emergency</div>
        </div>
      </div>

      <div class="timeline">
        <div class="timeline-top">
          <button class="play-btn" id="playBtn">▶ Replay</button>
          <div class="day-lbl" id="dayLbl">—</div>
          <button class="play-btn" id="todayBtn">⏭ Today</button>
        </div>
        <input type="range" id="daySlider" min="0" max="13" value="13" step="1">
        <div class="timeline-days"><span>14 days ago</span><span>Today</span></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="tabs">
        <div class="tab active" data-tab="detail">Sector</div>
        <div class="tab" data-tab="feed">Live Feed</div>
        <div class="tab" data-tab="report">Report</div>
        <div class="tab" data-tab="ops">Operations</div>
      </div>

      <div class="tab-panel" id="panel-detail"></div>
      <div class="tab-panel" id="panel-feed" style="display:none;"></div>
      <div class="tab-panel" id="panel-report" style="display:none;"></div>
      <div class="tab-panel" id="panel-ops" style="display:none;"></div>
    </div>

  </div>
</div>

<script>
/* ---------------------------------------------------------
   DATA MODEL
--------------------------------------------------------- */
const SECTORS = [
  { id:'hazratbal', name:'Hazratbal', tag:'NW · Dargah Hazratbal Shrine', station:'Hazratbal Station', bias:{sewage:1.3, veg:1.1, plastic:1.0, algae:1.0, cong:0.8, comp:1.0} },
  { id:'boddal',    name:'Bod Dal', tag:'N · Main Open-Water Basin', station:'Bod Dal Control Post', bias:{sewage:1.0, veg:1.2, plastic:1.1, algae:1.1, cong:0.9, comp:0.9} },
  { id:'nishat',    name:'Nishat–Shalimar', tag:'NE · Shalimar &amp; Nishat Gardens', station:'Nishat–Shalimar Station', bias:{sewage:0.8, veg:0.9, plastic:0.9, algae:0.8, cong:0.9, comp:0.8} },
  { id:'nigeen',    name:'Nigeen Lake', tag:'W Lobe · Nagin Bagh', station:'Nigeen Station', bias:{sewage:0.7, veg:0.8, plastic:0.7, algae:0.7, cong:0.7, comp:0.6} },
  { id:'lokutdal',  name:'Lokut Dal', tag:'Central · Floating Gardens', station:'Floating Gardens Post', bias:{sewage:0.9, veg:1.0, plastic:1.0, algae:0.9, cong:1.1, comp:1.0} },
  { id:'rainawari', name:'Rainawari', tag:'SW Shore · Residential', station:'Rainawari Station', bias:{sewage:1.5, veg:1.0, plastic:1.2, algae:1.0, cong:0.7, comp:1.1} },
  { id:'boulevard', name:'Boulevard–Tulip Garden', tag:'SE Shore · Houseboats &amp; Tourism', station:'Boulevard Station', bias:{sewage:1.1, veg:0.7, plastic:1.3, algae:0.7, cong:1.6, comp:1.5} },
  { id:'gagribal',  name:'Gagribal–Foreshore', tag:'S Basin · Dal Gate / Pari Mahal', station:'Gagribal Station', bias:{sewage:1.0, veg:0.9, plastic:1.0, algae:0.9, cong:1.0, comp:1.0} },
];

const WEIGHTS = { plastic:20, veg:15, algae:15, sewage:25, cong:5, comp:10 }; // sums to 90 -> normalize *100/90
const WSUM = Object.values(WEIGHTS).reduce((a,b)=>a+b,0);

const DAYS = 14;
const REPORT_TYPES = [
  'Floating plastic waste','Sewage discharge','Algae bloom','Water hyacinth spread',
  'Dead fish sighting','Illegal dumping','Oil sheen on water','Boat congestion'
];
const AI_DETECTIONS = [
  'AI flagged floating debris cluster','Satellite NDWI anomaly detected','CCTV: unauthorized shoreline construction',
  'Drone pass: sedimentation increase','Sensor: turbidity spike','CCTV: night-time dumping activity'
];

// seeded PRNG so the demo is reproducible across scrubs
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}
function seedFor(sectorIdx, day, salt){ return sectorIdx*10007 + day*131 + salt*7919 + 42; }

// generate deterministic history: sectorId -> [ {plastic,veg,algae,sewage,cong,comp,score} x14 ]
const history = {};
SECTORS.forEach((s, si) => {
  history[s.id] = [];
  for (let d=0; d<DAYS; d++){
    const rnd = mulberry32(seedFor(si, d, 1));
    const raw = {
      plastic: Math.min(100, 18 + rnd()*45*s.bias.plastic),
      veg:     Math.min(100, 12 + rnd()*40*s.bias.veg),
      algae:   Math.min(100, 10 + rnd()*38*s.bias.algae),
      sewage:  Math.min(100, 15 + rnd()*48*s.bias.sewage),
      cong:    Math.min(100, 8  + rnd()*55*s.bias.cong),
      comp:    Math.min(100, 10 + rnd()*42*s.bias.comp),
    };
    const weighted = (raw.plastic*WEIGHTS.plastic + raw.veg*WEIGHTS.veg + raw.algae*WEIGHTS.algae +
                       raw.sewage*WEIGHTS.sewage + raw.cong*WEIGHTS.cong + raw.comp*WEIGHTS.comp) / WSUM;
    history[s.id].push({...raw, score: Math.round(weighted)});
  }
});

// generate feed items (reports + AI detections) per day per sector
const feedData = {}; // day -> [{sectorId, kind:'report'|'ai', text, time, resolved}]
for (let d=0; d<DAYS; d++){
  feedData[d] = [];
  SECTORS.forEach((s, si) => {
    const rnd = mulberry32(seedFor(si, d, 2));
    const n = Math.floor(rnd()*3); // 0-2 reports
    for (let i=0;i<n;i++){
      const r2 = mulberry32(seedFor(si, d, 3+i));
      feedData[d].push({
        sectorId: s.id,
        kind: r2() > 0.4 ? 'report' : 'ai',
        text: r2() > 0.4 ? REPORT_TYPES[Math.floor(r2()*REPORT_TYPES.length)] : AI_DETECTIONS[Math.floor(r2()*AI_DETECTIONS.length)],
        time: `${6 + Math.floor(r2()*14)}:${(Math.floor(r2()*60)).toString().padStart(2,'0')}`,
        resolved: d < DAYS-1 ? true : r2() > 0.55
      });
    }
  });
}

/* ---------------------------------------------------------
   STATE
--------------------------------------------------------- */
let state = {
  day: DAYS-1,
  selectedSector: 'lokutdal',
  activeTab: 'detail',

function scoreColor(score){
  if (score <= 25) return getCss('--healthy');
  if (score <= 50) return getCss('--moderate');
  if (score <= 75) return getCss('--critical');
  return getCss('--emergency');
}
function scoreLabel(score){
  if (score <= 25) return 'Healthy';
  if (score <= 50) return 'Moderate';
  if (score <= 75) return 'Critical';
  return 'Emergency';
}
function getCss(varName){ return getComputedStyle(document.documentElement).getPropertyValue(varName).trim(); }

function getSectorsCurrentDayData(){
  const result = {};
  SECTORS.forEach(s => {
    result[s.id] = history[s.id][state.day];
  });
  return result;
}

function updateUI(){
  const currentData = getSectorsCurrentDayData();
  
  // 1. Update stats row (Overall metrics for the current day)
  let sumScore = 0;
  let sumPlastic = 0;
  let sumSewage = 0;
  let activeTicketsCount = 0;
  
  SECTORS.forEach(s => {
    const data = currentData[s.id];
    sumScore += data.score;
    sumPlastic += data.plastic;
    sumSewage += data.sewage;
    
    // count active tickets on this day
    const dayFeed = feedData[state.day] || [];
    activeTicketsCount += dayFeed.filter(f => f.sectorId === s.id && !f.resolved).length;
  });
  
  const avgScore = Math.round(sumScore / SECTORS.length);
  const avgPlastic = Math.round(sumPlastic / SECTORS.length);
  const avgSewage = Math.round(sumSewage / SECTORS.length);
  
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-card ${avgScore > 50 ? 'warn' : 'good'}">
      <div class="val">${avgScore}</div>
      <div class="lbl">Lake Health score</div>
    </div>
    <div class="stat-card">
      <div class="val">${avgPlastic} kg</div>
      <div class="lbl">Estimated Floating Waste</div>
    </div>
    <div class="stat-card">
      <div class="val">${avgSewage} NTU</div>
      <div class="lbl">Avg Turbidity</div>
    </div>
    <div class="stat-card warn">
      <div class="val">${activeTicketsCount}</div>
      <div class="lbl">Pending Action Tickets</div>
    </div>
  `;

  // 2. Update Map Polygons Fill color based on current day score
  SECTORS.forEach(s => {
    const data = currentData[s.id];
    const poly = document.getElementById(`poly-${s.id}`);
    const color = scoreColor(data.score);
    
    if (poly) {
      const isSelected = state.selectedSector === s.id;
      poly.setAttribute('fill', color);
      poly.setAttribute('class', `sector-poly ${isSelected ? 'selected' : ''}`);
      poly.style.fillOpacity = isSelected ? '0.35' : '0.15';
    }
  });

  // 3. Update Sidebar Sectors list
  const sectorList = document.getElementById('sectorList');
  sectorList.innerHTML = SECTORS.map(s => {
    const data = currentData[s.id];
    const isSelected = state.selectedSector === s.id;
    return `
      <div class="sector-item ${isSelected ? 'active' : ''}" onclick="selectSector('${s.id}')">
        <div class="name">
          ${s.name}
          <span>${scoreLabel(data.score)} · WQI ${data.score}</span>
        </div>
        <div class="dot" style="color:${scoreColor(data.score)}"></div>
      </div>
    `;
  }).join('');

  // 4. Update timeline slider and day label
  const daySlider = document.getElementById('daySlider');
  daySlider.value = state.day;
  
  const dayLbl = document.getElementById('dayLbl');
  const dOffset = DAYS - 1 - state.day;
  dayLbl.textContent = dOffset === 0 ? "Today" : `${dOffset} days ago`;

  // 5. Update selected sector detail panel
  renderTabContent();
  
  // 6. Update user's mock loyalty/trust score on header
  const headerPoints = document.getElementById('headerPoints');
  const totalPoints = 380 + (DAYS - dOffset) * 15;
  headerPoints.innerHTML = `🏅 ${totalPoints} Eco-Points`;
}

// simulate operations dispatch click
function dispatchCrew(task, button) {
  button.disabled = true;
  button.textContent = "Dispatched";
  button.style.borderColor = "var(--mist)";
  button.style.color = "var(--mist)";
  
  // push live feed item
  const dayFeed = feedData[state.day] || [];
  dayFeed.push({
    sectorId: state.selectedSector,
    kind: 'ai',
    text: `Crew dispatched: ${task}`,
    time: 'Now',
    resolved: false
  });
  setTimeout(() => {
    updateUI();
  }, 1000);
}

// simulate report submission
function submitReport(e) {
  e.preventDefault();
  const cat = document.getElementById('rep-cat').value;
  const desc = document.getElementById('rep-desc').value;
  
  // append item to current day's live feed
  feedData[state.day].push({
    sectorId: state.selectedSector,
    kind: 'report',
    text: cat,
    time: 'Now',
    resolved: false
  });
  
  alert(`Report submitted successfully! High citizen trust score detected. Standard AI verification bypassed.`);
  
  // switch tab to live feed
  switchTab('feed');
  updateUI();
}

function switchTab(tabId){
  state.activeTab = tabId;
  
  // toggle tab styling
  document.querySelectorAll('.tab').forEach(el => {
    if (el.getAttribute('data-tab') === tabId) {
      el.classList.add('active');
    } else {
      el.classList.remove('active');
    }
  });
  
  // toggle tab panels
  document.querySelectorAll('.tab-panel').forEach(panel => {
    if (panel.id === `panel-${tabId}`) {
      panel.style.display = 'block';
    } else {
      panel.style.display = 'none';
    }
  });
  
  renderTabContent();
}

    }
    
    timerId = setInterval(() => {
      if (state.day < DAYS-1) {
        state.day++;
        updateUI();
      } else {
        clearInterval(timerId);
        playBtn.textContent = "▶ Replay";
        state.playing = false;
      }
    }, 850);
  }
});

const todayBtn = document.getElementById('todayBtn');
todayBtn.addEventListener('click', () => {
  if (state.playing) {
    clearInterval(timerId);
    playBtn.textContent = "▶ Replay";
    state.playing = false;
  }
  state.day = DAYS-1;
  updateUI();
});

// Clock ticking
function tickClock() {
  const clockLine = document.getElementById('clockLine');
  const d = new Date();
  clockLine.textContent = d.toLocaleTimeString() + " | SYNC NOMINAL";
}
setInterval(tickClock, 1000);
tickClock();

// initialize UI
updateUI();
</script>
</body>
</html>
